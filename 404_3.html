<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Signal perdu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
  }

  .page {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }

  .bg-fill {
    position: absolute;
    inset: 0;
    background: #050505;
    z-index: 0;
  }

  .screen {
    position: relative;
    width: min(70vw, 640px);
    aspect-ratio: 904 / 720;
    background: #000;
    border: 2px solid rgba(216,212,200,0.25);
    border-radius: 4px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 60px rgba(0,0,0,0.6);
    z-index: 1;
  }

  .bg-video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(15%) brightness(0.75);
    display: block;
  }

  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.75) 100%);
    pointer-events: none;
  }

  .scanlines {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.25) 0px,
      rgba(0,0,0,0.25) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    opacity: 0.5;
  }

  .title-404 {
    position: relative;
    z-index: 2;
    color: #d8d4c8;
    font-family: 'Courier New', Courier, monospace;
    font-size: 20px;
    letter-spacing: 0.1em;
  }

  .noclip-btn {
    position: relative;
    z-index: 2;
    background: transparent;
    border: 1px solid rgba(216,212,200,0.4);
    color: #d8d4c8;
    font-family: 'Courier New', Courier, monospace;
    font-size: 14px;
    letter-spacing: 0.1em;
    text-transform: lowercase;
    padding: 12px 32px;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .noclip-btn:hover {
    background: rgba(216,212,200,0.1);
    border-color: rgba(216,212,200,0.8);
  }

  /* Overlay d'entree : un seul clic ici lance la video ET le son en meme temps.
     Les navigateurs exigent un clic direct sur un element pour autoriser le son ;
     c'est ce que font les sites type guns.lol, juste caché derriere un ecran d'accueil. */
  .enter-overlay {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .enter-overlay.hidden {
    display: none;
  }
  .enter-text {
    color: #d8d4c8;
    font-family: 'Courier New', Courier, monospace;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: lowercase;
    border: 1px solid rgba(216,212,200,0.3);
    padding: 14px 36px;
    border-radius: 2px;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<div class="enter-overlay" id="enterOverlay">
  <div class="enter-text">euh ?</div>
</div>

<div class="page">
  <div class="bg-fill"></div>

  <div class="title-404">404</div>

  <div class="screen">
    <video class="bg-video" id="bgVideo" src="backrooms.mp4" muted loop playsinline></video>
    <div class="vignette"></div>
    <div class="scanlines"></div>
  </div>

  <button class="noclip-btn" id="noclipBtn">no clip ?</button>
</div>

<script>
  const video = document.getElementById('bgVideo');
  const overlay = document.getElementById('enterOverlay');
  const noclipBtn = document.getElementById('noclipBtn');

  overlay.addEventListener('click', () => {
    video.muted = false;
    video.play().catch(() => {});
    overlay.classList.add('hidden');
  }, { once: true });

  noclipBtn.addEventListener('click', () => {
    window.location.href = 'https://unmushin.github.io/scumfuckmushboi/';
  });
</script>

</body>
</html>
