<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — Signal perdu</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', Courier, monospace;
  }

  .page {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .bg-video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(15%) brightness(0.75);
    z-index: 0;
  }

  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.85) 100%);
    z-index: 1;
    pointer-events: none;
  }

  .scanlines {
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.25) 0px,
      rgba(0,0,0,0.25) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 2;
    pointer-events: none;
    opacity: 0.5;
  }

  .content {
    position: relative;
    z-index: 3;
    text-align: center;
    padding: 24px;
    max-width: 640px;
  }

  .code {
    font-size: clamp(64px, 14vw, 140px);
    font-weight: 700;
    color: #d8d4c8;
    letter-spacing: 0.05em;
    text-shadow: 0 0 18px rgba(255,255,255,0.25), 0 0 2px rgba(255,255,255,0.4);
    animation: flicker 4s infinite;
  }

  .message {
    margin-top: 8px;
    font-size: clamp(14px, 2.4vw, 20px);
    color: #b8b3a3;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .submessage {
    margin-top: 18px;
    font-size: clamp(12px, 1.8vw, 15px);
    color: #7a7666;
    letter-spacing: 0.03em;
    line-height: 1.6;
  }

  .home-link {
    display: inline-block;
    margin-top: 40px;
    padding: 12px 28px;
    border: 1px solid rgba(216,212,200,0.4);
    color: #d8d4c8;
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
  }
  .home-link:hover {
    background: rgba(216,212,200,0.1);
    border-color: rgba(216,212,200,0.8);
  }

  @keyframes flicker {
    0%, 92%, 100% { opacity: 1; }
    93% { opacity: 0.4; }
    94% { opacity: 1; }
    95% { opacity: 0.6; }
    96% { opacity: 1; }
  }

  .noise-toggle {
    position: absolute;
    bottom: 20px;
    right: 20px;
    z-index: 4;
    background: transparent;
    border: 1px solid rgba(216,212,200,0.3);
    color: #b8b3a3;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 8px 14px;
    cursor: pointer;
    border-radius: 2px;
  }
  .noise-toggle:hover {
    border-color: rgba(216,212,200,0.7);
    color: #d8d4c8;
  }
</style>
</head>
<body>

<div class="page">
  <video class="bg-video" id="bgVideo" src="backrooms.mp4" autoplay muted loop playsinline></video>
  <div class="vignette"></div>
  <div class="scanlines"></div>

  <div class="content">
    <div class="code">404</div>
    <div class="message">Aucun signal</div>
    <div class="submessage">
      Cette page n'existe pas, ou n'existe plus vraiment.<br>
      Tu t'es peut-être égaré entre deux pièces.
    </div>
    <a class="home-link" href="/">Retourner quelque part de connu</a>
  </div>

  <button class="noise-toggle" id="soundBtn">🔇 Son coupé</button>
</div>

<script>
  const video = document.getElementById('bgVideo');
  const soundBtn = document.getElementById('soundBtn');
  video.muted = true;
  video.play().catch(() => {});

  let soundOn = false;
  soundBtn.addEventListener('click', () => {
    soundOn = !soundOn;
    video.muted = !soundOn;
    soundBtn.textContent = soundOn ? '🔊 Son activé' : '🔇 Son coupé';
  });
</script>

</body>
</html>
