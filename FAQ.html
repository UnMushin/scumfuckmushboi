  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Montserrat Black', sans-serif;
    min-height: 100vh;
    background: linear-gradient(180deg, #ff8a2b 0%, #ff5e3a 35%, #e8432f 65%, #b8302a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  .bg-overlay {
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.35) 0px, rgba(0,0,0,0.35) 1px, transparent 1px, transparent 3px);
    opacity: 0.15; pointer-events: none; z-index: 0;
  }

  .faq-wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .faq-title {
    font-family: 'Montserrat Black', sans-serif;
    font-weight: 900;
    font-size: clamp(28px, 6vw, 44px);
    color: #fff;
    -webkit-text-stroke: 4px #000;
    paint-order: stroke fill;
    text-align: center;
    letter-spacing: 0.02em;
  }

  .faq-counter {
    font-family: 'Montserrat Black', sans-serif;
    font-weight: 900;
    color: #fff;
    -webkit-text-stroke: 2px #000;
    paint-order: stroke fill;
    font-size: 15px;
    letter-spacing: 0.05em;
  }

  .faq-card {
    width: 100%;
    background: rgba(60,30,20,0.32);
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 20px;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.5), 0 12px 28px rgba(0,0,0,0.3);
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    min-height: 220px;
    justify-content: center;
    animation: float 5s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-8px) rotate(0.5deg); }
  }

  .faq-question {
    font-family: 'Montserrat Black', sans-serif;
    font-weight: 900;
    color: #fff;
    -webkit-text-stroke: 3px #000;
    paint-order: stroke fill;
    font-size: clamp(18px, 4vw, 24px);
    line-height: 1.35;
  }

  .faq-answer {
    font-family: 'Courier New', Courier, monospace;
    font-weight: 400;
    color: #fff;
    font-size: clamp(14px, 3vw, 17px);
    line-height: 1.6;
    letter-spacing: 0.01em;
    text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
  }

  .faq-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
  }

  .faq-btn {
    padding: 12px 26px;
    border-radius: 999px;
    cursor: pointer;
    background: rgba(60,30,20,0.32);
    border: 1.5px solid rgba(255,255,255,0.4);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.5), 0 8px 18px rgba(0,0,0,0.25);
    color: #fff;
    font-family: 'Montserrat Black', sans-serif;
    font-weight: 900;
    font-size: 15px;
    letter-spacing: 0.02em;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease, opacity 0.2s ease;
    user-select: none;
  }
  .faq-btn:hover {
    transform: scale(1.06) translateY(-3px);
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.8), 0 16px 28px rgba(0,0,0,0.4);
    background: rgba(60,30,20,0.48);
    border-color: rgba(255,255,255,0.7);
  }
  .faq-btn:disabled {
    opacity: 0.35;
    cursor: default;
    transform: none;
  }
  .faq-btn:disabled:hover {
    transform: none;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.5), 0 8px 18px rgba(0,0,0,0.25);
    background: rgba(60,30,20,0.32);
    border-color: rgba(255,255,255,0.4);
  }

  .faq-back {
    margin-top: 4px;
    padding: 12px 32px;
    border-radius: 999px;
    cursor: pointer;
    background: rgba(0,0,0,0.35);
    border: 1.5px solid rgba(255,255,255,0.5);
    color: #fff;
    font-family: 'Montserrat Black', sans-serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 0.03em;
    text-decoration: none;
    display: inline-block;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .faq-back:hover {
    transform: scale(1.05);
    background: rgba(0,0,0,0.55);
  }

  .faq-dots {
    display: flex;
    gap: 8px;
  }
  .faq-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: rgba(255,255,255,0.35);
    border: 1px solid rgba(0,0,0,0.5);
    transition: background 0.2s ease, transform 0.2s ease;
  }
  .faq-dot.active {
    background: #fff;
    transform: scale(1.3);
  }
</style>
</head>
<body>

<div class="bg-overlay"></div>

<div class="faq-wrap">
  <div class="faq-title">FAQ</div>
  <div class="faq-counter" id="faqCounter"></div>

  <div class="faq-card">
    <div class="faq-question" id="faqQuestion"></div>
    <div class="faq-answer" id="faqAnswer"></div>
  </div>

  <div class="faq-dots" id="faqDots"></div>

  <div class="faq-nav">
    <button class="faq-btn" id="faqPrev">&larr; Precedent</button>
    <button class="faq-btn" id="faqNext">Suivant &rarr;</button>
  </div>

  <a class="faq-back" href="Portfolio.html">Retour au portfolio</a>
</div>

<script>
  const faq = [
    {
      q: "ptdr t ki ?",
      a: "bah j'suis mush, jfais malheureusement des videos sur roblox, une plateforme qui meurt jour par jour. Sinon a la base jfaisais des videos droles avec du montage de fou furieux."
    },
    {
      q: "tu montes avec quoi ?",
      a: "Je monte sur Premiere Pro, et pour des effets beaucoup plus poussee, j'utilise After Effects."
    },
    {
      q: "tu peux etre mon monteur stp gratuit stpppp",
      a: "Nan."
    },
    {
      q: "est-ce que je peux etre ton manager (je suis né hier) ?",
      a: "Nan."
    },
    {
      q: "t'as quel age ?",
      a: "Oui."
    },
    {
      q: "c'est quoi ton matos pour faire des videos super genial ???????????????",
      a: "Alors pour te repondre, j'ai un pc avec une carte graphique et un processeur, et une souris, et un clavier, et un ecran, et un disque dur, et un chargeur, et tout ca ca fait mon matos."
    },
    {
      q: "t'ecoutes quoi comme musique ???",
      a: "Regarde le mec en fond de la page internet et tu auras la reponse."
    },
    {
      q: "tu peux montrer ta tete ?",
      a: "Je suis tellement beau que montrer ma tete va tous vous mettre dans un coma."
    },
    {
      q: "ARE WE STILL FRIENDS?",
      a: "Non, et arrete, ca sert a rien, t'es tarpin bizarre."
    }
  ];

  let current = 0;

  const questionEl = document.getElementById('faqQuestion');
  const answerEl = document.getElementById('faqAnswer');
  const counterEl = document.getElementById('faqCounter');
  const dotsEl = document.getElementById('faqDots');
  const prevBtn = document.getElementById('faqPrev');
  const nextBtn = document.getElementById('faqNext');

  function render() {
    const item = faq[current];
    questionEl.textContent = item.q;
    answerEl.textContent = item.a;
    counterEl.textContent = 'Question ' + (current + 1) + ' / ' + faq.length;

    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === faq.length - 1;

    dotsEl.innerHTML = '';
    faq.forEach((_, i) => {
      const dot = document.createElement('div');
      dot.className = 'faq-dot' + (i === current ? ' active' : '');
      dotsEl.appendChild(dot);
    });
  }

  prevBtn.addEventListener('click', () => {
    if (current > 0) {
      current -= 1;
      render();
    }
  });

  nextBtn.addEventListener('click', () => {
    if (current < faq.length - 1) {
      current += 1;
      render();
    }
  });

  render();
</script>
